name: Replace rtp with configurable URL

on:
  workflow_dispatch:
    inputs:
      replacement_url:
        description: 'Replacement URL (without trailing slash)'
        required: true
        default: 'http://router.lan.prpr.one:4022/rtp'
        type: string
  schedule:
    - cron: '0 0 * * 0'  # Run every Sunday at midnight UTC

jobs:
  replace-rtp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download source m3u file
        run: |
          curl -L -o bj-unicom-iptv.m3u https://raw.githubusercontent.com/lelehub/udpxy-IPTV/main/bj-unicom-iptv.m3u

      - name: Create new m3u with replaced rtp
        run: |
          sed 's|^rtp://|${{ inputs.replacement_url || 'http://router.lan.prpr.one:4022/rtp' }}/|g' bj-unicom-iptv.m3u > bj-unicom-iptv-http.m3u

      - name: Create new m3u with replaced rtp haifengjiayuan
        run: |
          sed 's|^rtp://|${{ 'http://192.168.4.1:5140/rtp' }}/|g' bj-unicom-iptv.m3u > bj-unicom-iptv-http-haifengjiayuan.m3u

      - name: Show diff
        run: |
          diff bj-unicom-iptv.m3u bj-unicom-iptv-http.m3u || true
          
      - name: Upload new m3u file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bj-unicom-iptv-http
          path: bj-unicom-iptv-http.m3u
          
      - name: Upload new m3u file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bj-unicom-iptv-http-haifengjiayuan
          path: bj-unicom-iptv-http-haifengjiayuan.m3u
          
      - name: Commit and push new file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bj-unicom-iptv-http.m3u
          git commit -m 'chore: add m3u file with rtp replaced by http' || echo 'No changes to commit'
          git push
