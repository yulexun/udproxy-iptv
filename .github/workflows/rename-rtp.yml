name: Replace rtp with http in m3u

on:
  workflow_dispatch:
  push:
    paths:
      - 'bj-unicom-iptv.m3u'

jobs:
  replace-rtp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create new m3u with replaced rtp
        run: |
          sed 's|^rtp://|http://router.lan.prpr.one:4022/rtp/|g' bj-unicom-iptv.m3u > bj-unicom-iptv-http.m3u

      - name: Show diff
        run: |
          diff bj-unicom-iptv.m3u bj-unicom-iptv-http.m3u || true
          
      - name: Upload new m3u file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bj-unicom-iptv-http
          path: bj-unicom-iptv-http.m3u
      - name: Set up authentication for push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
      - name: Commit and push new file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add bj-unicom-iptv-http.m3u
          git commit -m 'chore: add m3u file with rtp replaced by http' || echo 'No changes to commit'
          git push